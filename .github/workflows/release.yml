name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.8.0)"
        required: true
        type: string
      release_notes:
        description: "Release notes (optional — auto-generated from commits if empty)"
        required: false
        type: string
      replace:
        description: "Replace existing release if it exists"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ── Step 1: Lint (clang-format + cppcheck) ───────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev cmake

      - name: Install LLVM 20
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-20 main" | sudo tee /etc/apt/sources.list.d/llvm-20.list
          sudo apt-get update
          sudo apt-get install -y clang-format-20

      - uses: actions/cache@v4
        id: cppcheck-cache
        with:
          path: /opt/cppcheck
          key: cppcheck-2.20.0-ubuntu-amd64

      - name: Build cppcheck 2.20.0
        if: steps.cppcheck-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 2.20.0 https://github.com/danmar/cppcheck.git /tmp/cppcheck
          cmake -S /tmp/cppcheck -B /tmp/cppcheck/build -DCMAKE_BUILD_TYPE=Release -DHAVE_RULES=OFF -DCMAKE_INSTALL_PREFIX=/opt/cppcheck
          cmake --build /tmp/cppcheck/build -j$(nproc)
          cmake --install /tmp/cppcheck/build

      - name: Add cppcheck to PATH
        run: echo "/opt/cppcheck/bin" >> "$GITHUB_PATH"

      - name: Lint
        run: scripts/lint.sh CLANG_FORMAT=clang-format-20

  # ── Step 2: Unit tests (ASan + UBSan) ───────────────────────
  # macOS: use cc (Apple Clang) — GCC on macOS doesn't ship ASan runtime
  # Linux: use system gcc — full ASan/UBSan support
  # Windows: MSYS2 MinGW GCC
  test-unix:
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            cc: gcc
            cxx: g++
          - os: ubuntu-24.04-arm
            arch: arm64
            cc: gcc
            cxx: g++
          - os: macos-14
            arch: arm64
            cc: cc
            cxx: c++
          - os: macos-15-intel
            arch: amd64
            cc: cc
            cxx: c++
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

      - name: Test
        run: scripts/test.sh CC=${{ matrix.cc }} CXX=${{ matrix.cxx }}

  test-windows:
    needs: [lint]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          path-type: inherit
          install: >-
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-compiler-rt
            mingw-w64-clang-x86_64-zlib
            make

      - name: Test
        shell: msys2 {0}
        run: scripts/test.sh CC=clang CXX=clang++ 'WIN32_LIBS=-lws2_32 -lpsapi -Wl,--allow-multiple-definition'

  # ── Step 3: Build binaries (standard + UI, all OS) ──────────
  build-unix:
    needs: [test-unix, test-windows]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
            cxx: g++
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            cc: gcc
            cxx: g++
          - os: macos-14
            goos: darwin
            goarch: arm64
            cc: cc
            cxx: c++
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            cc: cc
            cxx: c++
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build standard binary
        run: scripts/build.sh --version ${{ inputs.version }} CC=${{ matrix.cc }} CXX=${{ matrix.cxx }}

      - name: Archive standard binary
        run: |
          tar -czf codebase-memory-mcp-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            -C build/c codebase-memory-mcp

      - name: Build UI binary
        run: scripts/build.sh --with-ui --version ${{ inputs.version }} CC=${{ matrix.cc }} CXX=${{ matrix.cxx }}

      - name: Archive UI binary
        run: |
          tar -czf codebase-memory-mcp-ui-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz \
            -C build/c codebase-memory-mcp

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: "*.tar.gz"

  build-windows:
    needs: [test-unix, test-windows]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          path-type: inherit
          install: >-
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-zlib
            make

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build standard binary
        shell: msys2 {0}
        run: scripts/build.sh --version ${{ inputs.version }} CC=clang CXX=clang++ 'WIN32_LIBS=-lws2_32 -lpsapi -Wl,--allow-multiple-definition'

      - name: Archive standard binary
        shell: pwsh
        run: |
          Copy-Item build/c/codebase-memory-mcp -Destination codebase-memory-mcp.exe
          Compress-Archive -Path codebase-memory-mcp.exe -DestinationPath codebase-memory-mcp-windows-amd64.zip

      - name: Build UI binary
        shell: msys2 {0}
        run: scripts/build.sh --with-ui --version ${{ inputs.version }} CC=clang CXX=clang++ 'WIN32_LIBS=-lws2_32 -lpsapi -Wl,--allow-multiple-definition'

      - name: Archive UI binary
        shell: pwsh
        run: |
          Copy-Item build/c/codebase-memory-mcp -Destination codebase-memory-mcp-ui.exe -Force
          Compress-Archive -Path codebase-memory-mcp-ui.exe -DestinationPath codebase-memory-mcp-ui-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-windows-amd64
          path: "*.zip"

  # ── Step 4: Smoke test every binary ─────────────────────────
  smoke-unix:
    needs: [build-unix]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-14
            goos: darwin
            goarch: arm64
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
        variant: [standard, ui]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Extract binary
        run: |
          SUFFIX=${{ matrix.variant == 'ui' && '-ui' || '' }}
          tar -xzf codebase-memory-mcp${SUFFIX}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
          chmod +x codebase-memory-mcp

      - name: Smoke test (${{ matrix.variant }}, ${{ matrix.goos }}-${{ matrix.goarch }})
        run: scripts/smoke-test.sh ./codebase-memory-mcp

  smoke-windows:
    needs: [build-windows]
    strategy:
      matrix:
        variant: [standard, ui]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit
          install: >-
            mingw-w64-ucrt-x86_64-python3

      - uses: actions/download-artifact@v4
        with:
          name: binaries-windows-amd64

      - name: Extract binary
        shell: pwsh
        run: |
          $suffix = if ("${{ matrix.variant }}" -eq "ui") { "-ui" } else { "" }
          Expand-Archive -Path "codebase-memory-mcp${suffix}-windows-amd64.zip" -DestinationPath .

      - name: Smoke test (${{ matrix.variant }}, windows-amd64)
        shell: msys2 {0}
        run: scripts/smoke-test.sh ./codebase-memory-mcp.exe

  # ── Step 5: Create GitHub release ───────────────────────────
  release:
    needs: [smoke-unix, smoke-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -la *.tar.gz *.zip

      - name: Generate checksums
        run: sha256sum *.tar.gz *.zip > checksums.txt

      - name: Delete existing release
        if: ${{ inputs.replace }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: gh release delete "$VERSION" --yes --cleanup-tag || true

      - name: Create tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag -f "$VERSION"
          git push origin "$VERSION" --force

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          files: |
            *.tar.gz
            *.zip
            checksums.txt
          body: ${{ inputs.release_notes || '' }}
          generate_release_notes: ${{ inputs.release_notes == '' }}

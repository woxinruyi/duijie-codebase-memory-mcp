# Local test environment — mirrors GitHub Actions CI for all Docker-capable platforms.
#
# Coverage matrix:
#   Linux arm64:  native on Apple Silicon (mirrors CI ubuntu-24.04-arm)
#   Linux amd64:  QEMU emulation (mirrors CI ubuntu-latest)
#   macOS:        not possible in Docker — test natively: scripts/test.sh CC=cc
#   Windows:      not possible in Docker on Mac — CI only
#
# Each platform runs BOTH test (ASan/LeakSan) AND production build (-O2 -Werror).

services:
  # ── Test builds (ASan + UBSan + LeakSanitizer) ──────────────
  test:
    build:
      context: ..
      dockerfile: test-infrastructure/Dockerfile
    platform: linux/arm64
    volumes:
      - ..:/src
    command: ["CC=gcc", "CXX=g++"]

  test-amd64:
    build:
      context: ..
      dockerfile: test-infrastructure/Dockerfile
    platform: linux/amd64
    volumes:
      - ..:/src
    command: ["CC=gcc", "CXX=g++"]

  # ── Production builds (-O2 -Werror, catches stricter GCC warnings) ──
  build:
    build:
      context: ..
      dockerfile: test-infrastructure/Dockerfile
    platform: linux/arm64
    volumes:
      - ..:/src
    entrypoint: ["scripts/build.sh"]
    command: ["CC=gcc", "CXX=g++"]

  build-amd64:
    build:
      context: ..
      dockerfile: test-infrastructure/Dockerfile
    platform: linux/amd64
    volumes:
      - ..:/src
    entrypoint: ["scripts/build.sh"]
    command: ["CC=gcc", "CXX=g++"]

  # ── Lint ────────────────────────────────────────────────────
  lint:
    build:
      context: ..
      dockerfile: test-infrastructure/Dockerfile.lint
    volumes:
      - ..:/src
